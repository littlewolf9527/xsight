// xSight gRPC service definition.
// Shared between Node (client) and Controller (server).
//

syntax = "proto3";

package xsight;

option go_package = "github.com/littlewolf9527/xsight/node/internal/pb";

import "google/protobuf/empty.proto";

// ---------------------------------------------------------------------------
// Service definition — Node is gRPC client, Controller is gRPC server
// ---------------------------------------------------------------------------

service XSightService {
  // Handshake: Node → Controller (unary, first step after connection)
  rpc Handshake(NodeHandshake) returns (HandshakeResponse);

  // Three reporting streams: Node → Controller (client streaming)
  rpc StatsStream(stream StatsReport) returns (google.protobuf.Empty);
  rpc SampleStream(stream SampleBatch) returns (google.protobuf.Empty);
  rpc CriticalEventStream(stream CriticalEvent) returns (google.protobuf.Empty);

  // Control channel: Controller ↔ Node (bidirectional streaming)
  rpc ControlStream(stream ControlMessage) returns (stream ControlMessage);
}

// ---------------------------------------------------------------------------
// Handshake
// ---------------------------------------------------------------------------

message NodeHandshake {
  string node_id = 1;
  string api_key = 2;
  repeated string interfaces = 3;
  string agent_version = 4;
  uint64 delivery_version_applied = 5;  // local snapshot version, 0 = none
  string mode = 6;                      // "xdp" (default) | "flow" — v3.0
}

message HandshakeResponse {
  bool   accepted = 1;
  string reject_reason = 2;
  WatchConfig watch_config = 3;
  uint64 delivery_version_current = 4;
}

// ---------------------------------------------------------------------------
// Channel 1: StatsStream (1s aggregated, detection main path)
// ---------------------------------------------------------------------------

message StatsReport {
  string node_id = 1;
  string interface_name = 2;
  uint32 upstream_sample_rate = 3;
  uint32 local_sample_rate = 4;
  int64  timestamp = 5;                   // unix epoch seconds
  repeated IPStats ip_stats = 6;
  repeated PrefixStatsMsg prefix_stats = 7;
  NodeHealth health = 8;
  SamplingMetrics sampling_metrics = 9;
  uint32 gap_seconds = 10;               // data gap after reconnect
  bool   ip_stats_truncated = 11;
  uint32 total_active_ips = 12;
  GlobalStatsMsg global_stats = 13;
  repeated FlowSample top_flows = 20;    // top-N flows this tick

  // v2.11 Phase 2: outbound (src_ip matched) stats
  repeated IPStats src_ip_stats = 30;
  repeated PrefixStatsMsg src_prefix_stats = 31;
  bool   src_ip_stats_truncated = 32;
  uint32 total_active_src_ips = 33;
}

// FlowSample is a single aggregated flow (5-tuple) from one tick.
message FlowSample {
  bytes  src_ip      = 1;  // 4 or 16 bytes
  bytes  dst_ip      = 2;
  uint32 src_port    = 3;
  uint32 dst_port    = 4;
  uint32 protocol    = 5;  // 6=TCP, 17=UDP, 1=ICMP
  uint32 tcp_flags   = 6;  // cumulative OR of all TCP flags
  uint64 packets     = 7;
  uint64 bytes_total = 8;
}

message IPStats {
  bytes  dst_ip = 1;           // 4 bytes (IPv4) or 16 bytes (IPv6)
  uint64 pkt_count = 2;
  uint64 byte_count = 3;
  // Fields 4-8 DEPRECATED — kept for rollout backward compatibility.
  // Controller reads field 20 first; if empty, falls back to these.
  // Will be replaced with 'reserved 4,5,6,7,8' in a future cleanup release.
  uint32 tcp_count = 4      [deprecated = true];
  uint32 tcp_syn_count = 5  [deprecated = true];
  uint32 udp_count = 6      [deprecated = true];
  uint32 icmp_count = 7     [deprecated = true];
  uint32 frag_count = 8     [deprecated = true];
  uint32 small_pkt = 9;       // <128B
  uint32 medium_pkt = 10;     // 128-512B
  uint32 large_pkt = 11;      // >512B
  repeated uint32 decoder_counts = 20;      // indexed by shared/decoder constants
  repeated uint64 decoder_byte_counts = 21; // per-decoder byte counts for BPS thresholds
}

message PrefixStatsMsg {
  bytes  prefix = 1;           // network address (4 or 16 bytes)
  uint32 prefix_len = 2;
  uint64 pkt_count = 3;
  uint64 byte_count = 4;
  uint32 active_ips = 5;
  uint32 overflow_count = 6;
  // Fields 7-11 DEPRECATED — same rollout strategy as IPStats.
  uint32 tcp_count = 7      [deprecated = true];
  uint32 tcp_syn_count = 8  [deprecated = true];
  uint32 udp_count = 9      [deprecated = true];
  uint32 icmp_count = 10    [deprecated = true];
  uint32 frag_count = 11    [deprecated = true];
  repeated uint32 decoder_counts = 20;      // indexed by shared/decoder constants
  repeated uint64 decoder_byte_counts = 21; // per-decoder byte counts for BPS thresholds
}

message GlobalStatsMsg {
  uint64 total_pkts = 1;
  uint64 total_bytes = 2;
  uint64 matched_pkts = 3;
  uint64 matched_bytes = 4;                   // v2.11: bytes within watch scope (for global ip+bps)
  repeated uint32 decoder_counts = 20;        // v2.11: per-decoder PPS breakdown (matched only)
  repeated uint64 decoder_byte_counts = 21;   // v2.11: per-decoder BPS breakdown (matched only)
  // v2.11 Phase 2: outbound (src_ip matched) global counters
  uint64 src_matched_pkts = 30;
  uint64 src_matched_bytes = 31;
  repeated uint32 src_decoder_counts = 32;
  repeated uint64 src_decoder_byte_counts = 33;
}

message NodeHealth {
  string status = 1;           // "healthy" | "degraded" | "unhealthy"
  string message = 2;
}

message SamplingMetrics {
  float  ring_fill_ratio = 1;
  uint64 dropped_kernel = 2;
  uint64 dropped_user = 3;
  uint64 decode_error = 4;
  float  batch_send_latency_ms = 5;
  float  effective_sample_rate = 6;
}

// ---------------------------------------------------------------------------
// Channel 2: SampleStream (continuous small batches, best-effort)
// ---------------------------------------------------------------------------

message SampleBatch {
  string node_id = 1;
  string interface_name = 2;
  uint32 upstream_sample_rate = 3;
  uint32 local_sample_rate = 4;
  int64  timestamp = 5;
  repeated PacketSample samples = 6;
}

message PacketSample {
  bytes  raw_header = 1;
  bytes  src_ip = 2;
  bytes  dst_ip = 3;
  uint32 ip_protocol = 4;
  uint32 src_port = 5;
  uint32 dst_port = 6;
  uint32 packet_length = 7;
  uint32 tcp_flags = 8;
  uint32 ip_ttl = 9;
  uint32 fragment_offset = 10;
  uint32 icmp_type = 11;
  uint32 icmp_code = 12;
}

// ---------------------------------------------------------------------------
// Channel 3: CriticalEventStream (event-driven, lowest latency)
// ---------------------------------------------------------------------------

message CriticalEvent {
  string node_id = 1;
  string interface_name = 2;
  int64  timestamp = 3;
  bytes  dst_ip = 4;
  string event_type = 5;                 // e.g. "hard_threshold_exceeded"
  map<string, uint64> counters = 6;      // snapshot at trigger time
}

// ---------------------------------------------------------------------------
// Channel 4: ControlStream (bidirectional)
// ---------------------------------------------------------------------------

message ControlMessage {
  oneof payload {
    ConfigPush config_push = 1;
    ConfigAck  config_ack = 2;
  }
}

message ConfigPush {
  WatchConfig watch_config = 1;
  uint64 delivery_version_current = 2;
}

message ConfigAck {
  uint64 delivery_version_applied = 1;
  bool   success = 2;
  string error_message = 3;
}

message WatchConfig {
  repeated WatchPrefix prefixes = 1;
  HardThresholds hard_thresholds = 2;
  // v3.0: flow mode config (ignored by xdp nodes, protobuf backward compatible)
  repeated FlowListenerConfig flow_listeners = 3;
}

// v3.0: Flow listener + source config pushed to Flow Nodes
message FlowListenerConfig {
  string listen_address = 1;                  // ":6343", ":2055"
  string protocol_mode = 2;                   // "auto" | "sflow" | "netflow" | "ipfix"
  repeated FlowSourceConfig sources = 3;
  bool   enabled = 4;
}

message FlowSourceConfig {
  string device_ip = 1;                       // exporter IP (matched against UDP src)
  string sample_mode = 2;                     // "auto" | "force" | "none"
  int32  sample_rate = 3;                     // force mode override value
  string name = 4;                            // display name
  bool   enabled = 5;
}

message WatchPrefix {
  bytes  prefix = 1;           // network address
  uint32 prefix_len = 2;
  string name = 3;             // human-readable label
}

message HardThresholds {
  uint64 pps = 1;              // per-IP packets/sec threshold
  uint64 bps = 2;              // per-IP bits/sec threshold
}
